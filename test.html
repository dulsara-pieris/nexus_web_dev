<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Epic Web Terminal</title>

    <!-- jQuery -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    
    <!-- jQuery Terminal -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/jquery.terminal/2.45.2/css/jquery.terminal.min.css" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.terminal/2.45.2/js/jquery.terminal.min.js"></script>

    <!-- Typed.js -->
    <script src="https://cdn.jsdelivr.net/npm/typed.js@3.0.0/lib/typed.min.js"></script>

    <style>
        body {
            background: black;
            font-family: monospace;
            color: #0f0;
            margin: 0;
            height: 100vh;
        }
        #terminal {
            height: 100%;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div id="terminal"></div>

    <script>
        $(function() {
            const commands = {
                help: function() {
                    this.echo('Available commands: [[;yellow;]help], [[;yellow;]clear], [[;yellow;]about], [[;yellow;]hack]');
                },
                clear: function() {
                    this.clear();
                },
                about: function() {
                    this.echo('This is a fully-featured web terminal with autocomplete, history, colors, and typing effects!');
                },
                hack: function() {
                    this.echo('Initializing hack sequence...');
                    let typed = new Typed('#terminal', {
                        strings: ['Connecting to mainframe...', 'Bypassing firewall...', 'Extracting secret files...', 'Hack complete! ✅'],
                        typeSpeed: 40,
                        backSpeed: 0,
                        smartBackspace: true,
                        loop: false,
                        onStringTyped: (arrayPos, self) => {
                            if(arrayPos === 3) {
                                this.echo('[[;green;]All systems hacked successfully]');
                            }
                        }
                    });
                }
            };

            $('#terminal').terminal(commands, {
                greetings: '[[;cyan;]Welcome to Synapsnex Terminal]\nType [[;yellow;]help] to see commands.',
                name: 'synapsnex',
                height: '100%',
                prompt: 'guest@synapsnex:~$ ',
                completion: Object.keys(commands),
                history: true,
                keymap: {
                    'CTRL+C': function(e, original) { this.echo('^C'); return false; },
                    'CTRL+L': function(e, original) { this.clear(); return false; }
                }
            });
        });
    </script>
</body>
</html>
